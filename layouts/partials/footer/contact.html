<section class="col-6 col-12-narrower">
    <h3>{{ .header | default "Get In Touch" }}</h3>
    <form method="POST" action="{{ .action }}" id="footer-contact-form">
        <div class="row gtr-50">
            <div class="col-6 col-12-mobilep">
                <input type="text" name="name" id="name" placeholder="{{ T "contact_name" }}" />
            </div>
            <div class="col-6 col-12-mobilep">
                <input type="email" name="email" id="email" placeholder="{{ T "contact_email" }}" />
            </div>
            <div class="col-12" >
                <textarea name="message" id="message" placeholder="{{ T "contact_message" }}" rows="5"></textarea>
            </div>
            <div class="col-12 centered">
                <ul class="actions">
                    <li><input type="submit" class="button alt" value="{{ T "contact_submit" }}"  /></li>
                    <li>
                      <!-- reCAPTCHA (lazy-loaded on first form interaction) -->
                      <div id="footer-recaptcha-widget"></div>
                    </li>
                </ul>
            </div>

        </div>
    </form>
</section>

<script>
(function() {
  var widgetId = 'footer-recaptcha-widget';
  var siteKey = '{{ site.Params.recaptchaSiteKey }}';
  var lang = '{{ site.Language.Lang }}';
  var loaded = false;

  function renderWidget() {
    if (document.getElementById(widgetId)) {
      grecaptcha.render(widgetId, { sitekey: siteKey });
    }
  }

  function loadRecaptcha() {
    if (loaded) return;
    loaded = true;

    if (window.grecaptcha) {
      renderWidget();
      return;
    }

    window.recaptchaOnloadFooter = renderWidget;
    var script = document.createElement('script');
    script.src = 'https://www.google.com/recaptcha/api.js?onload=recaptchaOnloadFooter&render=explicit&hl=' + lang;
    script.async = true;
    script.defer = true;
    document.head.appendChild(script);
  }

  var form = document.getElementById(widgetId).closest('form');
  if (form) {
    var inputs = form.querySelectorAll('input, textarea, select');
    inputs.forEach(function(input) {
      input.addEventListener('focus', loadRecaptcha, { once: true });
    });
  }
})();
</script>
